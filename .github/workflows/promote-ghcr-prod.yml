name: Promote GHCR image to prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Source tag to promote to prod
        required: true
        default: main

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/medianexus
        run: |
          docker buildx imagetools create -t ${IMAGE}:prod ${IMAGE}:${{ inputs.source_tag }}
          docker buildx imagetools inspect ${IMAGE}:prod
